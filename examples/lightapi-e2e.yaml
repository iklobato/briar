# lightapi — extraction for iklobato/lightapi.

version: 1

companies:
  lightapi:
    knowledge:
      store: file
      name: ./knowledge/lightapi.md

    schedules:
      - task: extractors
        every: "day at 03:17"
        extract:
          - name: pr-archaeology
            args:
              pr_repo: [iklobato/lightapi]
              pr_max: 25

      - task: implementation
        every: "4 hours"
        extract:
          - name: codebase-conventions
            args:
              conventions_repo: [iklobato/lightapi]
          - name: github-deployments
            args:
              deploy_repo: [iklobato/lightapi]

      - task: prfix
        every: "hour"
        extract:
          - name: active-work
            args:
              active_repo: [iklobato/lightapi]
