# Example runbook — drives two companies × four pipelines from a single file.
#
# Apply with:
#     briar runbook apply examples/runbook.yaml
#
# Each `<company>.profile` must already exist locally (`briar profile use …`
# or `briar --profile <name> login` will create the slot). Each company's
# pinned `workspace_id` is set automatically; override per-runbook is
# possible by adding a `workspace_id` to `companies.<name>` here.

version: 1

companies:
  # --------------------------------------------------------------------
  # acme has Jira, GitHub and AWS available
  # --------------------------------------------------------------------
  acme:
    profile: acme-test
    workspace_id: 49c8b9d7-98c6-4f73-8e62-e90e1a06db0e
    defaults:
      llm_provider_key: anthropic
      model: claude-sonnet-4-6
      auth_mode: pat
      github_secret_id: 7e1ee226-d36a-4747-b8d7-39c333f462a2

    # Per-company knowledge base. `briar runbook extract <file>` walks
    # the `extract:` list below and writes the result here. `briar
    # runbook apply` reads this file (if it exists) and prepends it to
    # every agent's system_prompt at apply time (Path A integration).
    knowledge_file: ./knowledge/acme.md
    extract:
      - name: pr-archaeology
        args:
          pr_repo: [iklobato/lightapi]
          pr_max: 100
      - name: aws-infra
        args:
          aws_extract_profile: acme-prod
          aws_extract_region: us-east-1
          aws_extract_service: [ecs, rds, lambda, sqs, logs]
      - name: active-work
        args:
          active_repo: [iklobato/lightapi]
      - name: github-deployments
        args:
          deploy_repo: [iklobato/lightapi]
      - name: codebase-conventions
        args:
          conventions_repo: [iklobato/lightapi]

    runbooks:
      # Hourly cron: ingest tickets from Jira + open issues from GitHub,
      # pull AWS state for context, plan + checkpoint + implement.
      - template: implementation
        prefix: acme-impl
        owner: iklobato
        repo: lightapi
        sources:
          - kind: jira
            project: [ACME]
            # secret_id can be omitted to fall back to atlassian OAuth.
          - kind: github
            # auth_mode + github_secret_id inherited from company defaults
          - kind: aws
            role_arn: arn:aws:iam::123456789012:role/briar-reader
            external_id: acme-briar
            region: us-east-1
            services: [ec2, logs, iam]
        trigger:
          kind: schedule_cron
          schedule: "0 * * * *"

      # Hourly cron: sweep open PRs, fix unresolved review comments
      - template: pr-fixes
        prefix: acme-prfix
        owner: iklobato
        repo: lightapi
        sources:
          - kind: github
        trigger:
          kind: schedule_cron
          schedule: "0 * * * *"

  # --------------------------------------------------------------------
  # widgets — only GitHub + AWS (no Jira)
  # --------------------------------------------------------------------
  widgets:
    profile: widgets-test
    defaults:
      llm_provider_key: anthropic
      model: claude-sonnet-4-6
      auth_mode: pat
      github_secret_id: <widgets-pat-secret-uuid>
    runbooks:
      - template: implementation
        prefix: pt-impl
        owner: iklobato
        repo: widgets
        sources:
          - kind: github
          - kind: aws
            role_arn: arn:aws:iam::987654321098:role/briar-reader
            external_id: widgets-briar
            services: [ec2, s3, logs]
        trigger:
          kind: schedule_cron
          schedule: "0 * * * *"

      - template: pr-fixes
        prefix: pt-prfix
        owner: iklobato
        repo: widgets
        sources:
          - kind: github
        trigger:
          kind: schedule_cron
          schedule: "0 * * * *"
