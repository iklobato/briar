version: "3"

vars:
  DROPLET: root@203.0.113.11
  DROPLET_NAME: briar-scheduler
  DROPLET_ID: "572009953"
  # Firewall whose inbound TCP/22 list gates SSH access to the droplet.
  # `doctl compute firewall list` confirms briar-scheduler.
  FIREWALL_ID: 1230e3df-8d6f-4b03-a0f7-b11b0f14e09a
  LOG_DIR: /var/log/briar

tasks:
  ssh:
    desc: "Open an SSH session into the briar-scheduler droplet (root@203.0.113.11). Pass a command after `--` for one-shot mode (`task ssh -- uptime`)."
    interactive: true
    cmds:
      - >
        ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=3
        {{.DROPLET}} {{.CLI_ARGS}}

  tail:
    desc: "Follow scheduler + dashboard logs from the briar-scheduler droplet in real time"
    cmds:
      - >
        ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=3
        {{.DROPLET}}
        "tail -n 80 -F {{.LOG_DIR}}/scheduler.log {{.LOG_DIR}}/dashboard.log"

  allow-ip:
    desc: "Add the operator's current public IP to the briar-scheduler firewall SSH allow-list (TCP/22). Idempotent — re-running is a no-op when the IP is already whitelisted."
    cmds:
      - |
        set -eu
        IP=$(curl -fsS https://api.ipify.org 2>/dev/null) || {
          echo "ERR: failed to detect public IP via api.ipify.org" >&2
          exit 1
        }
        if ! echo "$IP" | grep -qE '^[0-9]{1,3}(\.[0-9]{1,3}){3}$'; then
          echo "ERR: api.ipify.org returned non-IPv4: '$IP'" >&2
          exit 1
        fi
        EXISTING=$(doctl compute firewall get {{.FIREWALL_ID}} --format InboundRules --no-header)
        if echo "$EXISTING" | grep -q "ports:22,address:${IP}/32"; then
          echo "$IP/32 is already whitelisted for TCP/22 on firewall {{.FIREWALL_ID}} — no-op."
          exit 0
        fi
        echo "Adding $IP/32 to firewall {{.FIREWALL_ID}} (TCP/22) …"
        doctl compute firewall add-rules {{.FIREWALL_ID}} \
          --inbound-rules "protocol:tcp,ports:22,address:${IP}/32"
        echo "Done. Verify with:  task ssh -- uptime"

  revoke-ip:
    desc: "Remove the operator's current public IP from the briar-scheduler firewall SSH allow-list. Mirror of `task allow-ip` for revocation."
    cmds:
      - |
        set -eu
        IP=$(curl -fsS https://api.ipify.org 2>/dev/null) || {
          echo "ERR: failed to detect public IP via api.ipify.org" >&2
          exit 1
        }
        EXISTING=$(doctl compute firewall get {{.FIREWALL_ID}} --format InboundRules --no-header)
        if ! echo "$EXISTING" | grep -q "ports:22,address:${IP}/32"; then
          echo "$IP/32 is not in the TCP/22 allow-list — nothing to remove."
          exit 0
        fi
        echo "Removing $IP/32 from firewall {{.FIREWALL_ID}} (TCP/22) …"
        doctl compute firewall remove-rules {{.FIREWALL_ID}} \
          --inbound-rules "protocol:tcp,ports:22,address:${IP}/32"
        echo "Done. Subsequent SSH attempts from $IP will hit the firewall."

  status:
    desc: "Show DigitalOcean-side facts about the briar-scheduler droplet (status, IP, region, size) via doctl — no SSH required."
    cmds:
      - >
        doctl compute droplet get {{.DROPLET_ID}} --output json
        | python3 -c "import json,sys; d=json.load(sys.stdin)[0];
        print(f'Name:      {d[\"name\"]}');
        print(f'ID:        {d[\"id\"]}');
        print(f'Status:    {d[\"status\"]}');
        print(f'Created:   {d[\"created_at\"]}');
        print(f'Region:    {d[\"region\"][\"slug\"]} ({d[\"region\"][\"name\"]})');
        print(f'Size:      {d[\"size_slug\"]} — {d[\"memory\"]}MB / {d[\"vcpus\"]} vCPU / {d[\"disk\"]}GB');
        print(f'Image:     {d[\"image\"][\"distribution\"]} {d[\"image\"][\"name\"]}');
        print(f'Tags:      {d[\"tags\"]}');
        [print(f'IPv4 {n[\"type\"]:>7}: {n[\"ip_address\"]}') for n in d['networks']['v4']]"
