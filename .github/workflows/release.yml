name: Release to PyPI

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      # Sync to the very latest main BEFORE bumping. A previous failed
      # release run may have left main moved underneath us; without
      # this re-sync the bump computes against stale pyproject.toml
      # and we collide with whatever already shipped to PyPI.
      - name: Sync to latest origin/main
        run: |
          git fetch origin main
          git reset --hard origin/main

      # Test gate on the exact code about to ship: a unit-test regression
      # aborts the run BEFORE the version bump, so a broken build never
      # reaches PyPI. release.yml previously published with no test run.
      # (The integration / property tiers run in tests.yml on the PR that
      # produced this push; black/ruff/mypy are not yet repo-clean, so they
      # are enforced per-file in review, not as a release gate.)
      - name: Test gate (unit suite)
        run: |
          uv sync --extra test
          uv run pytest -n auto -ra --strict-markers -m "not integration"

      - name: Bump patch version in pyproject.toml
        id: bump
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import re, pathlib
          p = pathlib.Path("pyproject.toml")
          txt = p.read_text()
          m = re.search(r'^version = "([^"]+)"', txt, flags=re.M)
          if not m:
              raise SystemExit("version not found in pyproject.toml")
          major, minor, patch = (int(x) for x in m.group(1).split("."))
          nxt = f"{major}.{minor}.{patch + 1}"
          p.write_text(re.sub(r'^version = "[^"]+"', f'version = "{nxt}"', txt, count=1, flags=re.M))
          print(f"current={m.group(1)}")
          print(f"next={nxt}")
          PY

      - name: Build sdist and wheel
        run: uv build

      # Push commit + tag BEFORE uploading to PyPI. The push is the
      # race gate: if main moved while we were bumping, rebase-retry
      # serializes us against the conflict and we land cleanly. If
      # rebase still loses after retries, we abort — no orphaned PyPI
      # wheels, no half-released versions.
      - name: Commit, tag, push (with rebase-retry)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore(release): v${{ steps.bump.outputs.next }}"
          git tag "v${{ steps.bump.outputs.next }}"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "push succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "push failed after 3 attempts; aborting before PyPI upload"
              exit 1
            fi
            echo "push attempt $attempt lost the race; rebasing and retrying"
            sleep 5
          done
          git push origin "v${{ steps.bump.outputs.next }}"

      # `skip-existing: true` is belt-and-suspenders. The push gate
      # above should already prevent two runs from racing to the same
      # version. If a previous failed run somehow uploaded the wheel
      # but never committed the bump, this lets a manual re-run
      # recover instead of hard-failing.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

      # Docker image, built from the SAME wheel just published (dist/ is the
      # uv-build output at the bumped version) so PyPI and the image never
      # drift. Requires repo secrets DOCKERHUB_USERNAME + DOCKERHUB_TOKEN.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            iklobato/briar:${{ steps.bump.outputs.next }}
            iklobato/briar:latest
